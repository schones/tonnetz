<svg width="280" height="64" viewBox="0 0 280 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Ghost lattice tendrils -->
  <line x1="26" y1="50" x2="2"  y2="50" stroke="#1e1c3a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="74" y2="50" stroke="#1e1c3a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="38" y1="8"  x2="38" y2="0"  stroke="#1e1c3a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="26" y1="50" x2="10" y2="28" stroke="#1e1c3a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="66" y2="28" stroke="#1e1c3a" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Triangle fill -->
  <polygon points="26,50 50,50 38,8" fill="#1e1b38"/>

  <!-- Triangle edges -->
  <line x1="26" y1="50" x2="50" y2="50" stroke="#7c75ff" stroke-width="2"   stroke-linecap="round"/>
  <line x1="26" y1="50" x2="38" y2="8"  stroke="#7c75ff" stroke-width="2"   stroke-linecap="round"/>
  <line x1="50" y1="50" x2="38" y2="8"  stroke="#7c75ff" stroke-width="2"   stroke-linecap="round"/>

  <!-- Glow halos -->
  <circle cx="38" cy="8"  r="12" fill="#f59e0b" opacity="0.18"/>
  <circle cx="26" cy="50" r="12" fill="#38bdf8" opacity="0.18"/>
  <circle cx="50" cy="50" r="12" fill="#4ade80" opacity="0.18"/>

  <!-- Three chord nodes -->
  <circle cx="38" cy="8"  r="7" fill="#f59e0b"/>
  <circle cx="26" cy="50" r="7" fill="#38bdf8"/>
  <circle cx="50" cy="50" r="7" fill="#4ade80"/>
  <circle cx="38" cy="8"  r="3" fill="white" opacity="0.9"/>
  <circle cx="26" cy="50" r="3" fill="white" opacity="0.9"/>
  <circle cx="50" cy="50" r="3" fill="white" opacity="0.9"/>

  <!-- Wordmark -->
  <text x="84" y="38" font-family="Nunito, sans-serif" font-weight="800" font-size="30" fill="#e8e6ff" letter-spacing="-0.5">tonnetz</text>

  <!-- Tagline -->
  <text x="86" y="56" font-family="Nunito, sans-serif" font-weight="700" font-size="10.5" fill="#6c63ff" letter-spacing="0.12em">MUSIC THEORY GAMES</text>
</svg>
