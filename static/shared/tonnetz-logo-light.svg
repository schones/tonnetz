<svg width="280" height="64" viewBox="0 0 280 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Ghost lattice tendrils -->
  <line x1="26" y1="50" x2="2"  y2="50" stroke="#d8d4f0" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="74" y2="50" stroke="#d8d4f0" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="38" y1="8"  x2="38" y2="0"  stroke="#d8d4f0" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="26" y1="50" x2="10" y2="28" stroke="#d8d4f0" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="66" y2="28" stroke="#d8d4f0" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Triangle fill -->
  <polygon points="26,50 50,50 38,8" fill="#f0eeff"/>

  <!-- Triangle edges -->
  <line x1="26" y1="50" x2="50" y2="50" stroke="#6c63ff" stroke-width="2"   stroke-linecap="round"/>
  <line x1="26" y1="50" x2="38" y2="8"  stroke="#6c63ff" stroke-width="2"   stroke-linecap="round"/>
  <line x1="50" y1="50" x2="38" y2="8"  stroke="#6c63ff" stroke-width="2"   stroke-linecap="round"/>

  <!-- Three chord nodes -->
  <circle cx="38" cy="8"  r="7" fill="#f59e0b"/>
  <circle cx="26" cy="50" r="7" fill="#38bdf8"/>
  <circle cx="50" cy="50" r="7" fill="#4ade80"/>
  <circle cx="38" cy="8"  r="3" fill="white"/>
  <circle cx="26" cy="50" r="3" fill="white"/>
  <circle cx="50" cy="50" r="3" fill="white"/>

  <!-- Wordmark -->
  <text x="84" y="38" font-family="Nunito, sans-serif" font-weight="800" font-size="30" fill="#1a1a2e" letter-spacing="-0.5">tonnetz</text>

  <!-- Tagline -->
  <text x="86" y="56" font-family="Nunito, sans-serif" font-weight="700" font-size="10.5" fill="#a29bfe" letter-spacing="0.12em">MUSIC THEORY GAMES</text>
</svg>
