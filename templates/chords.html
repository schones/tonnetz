{% extends "base.html" %}
{% block title %}Chord Identification — Tonnetz{% endblock %}

{% block head %}
    <style>
        /* Combine tonnetz dark theme with chords layout */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 640px;
            padding: 0 1rem;
        }

        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.25rem;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin: 1.5rem 0 0.25rem;
            letter-spacing: 0.05em;
            text-align: center;
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 400;
            color: #aaa;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        #prompt-area {
            font-size: 1.35rem;
            font-weight: 600;
            min-height: 3.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffca28;
        }

        #start-btn {
            display: block;
            width: 100%;
            max-width: 340px;
            margin: 0 auto 1.5rem;
            padding: 1rem;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(135deg, #1565c0, #5e35b1);
            box-shadow: 0 4px 20px rgba(94, 53, 177, 0.4);
            transition: opacity 0.15s, transform 0.1s;
        }

        #start-btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        #start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #status-text {
            text-align: center;
            font-size: 1.05rem;
            min-height: 1.6rem;
            margin-bottom: 1rem;
            color: #90caf9;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.75rem;
        }

        .result-header .label {
            font-size: 0.9rem;
            color: #aaa;
        }

        .result-header .value {
            font-size: 1.6rem;
            font-weight: 700;
        }

        .result-header .value.hit {
            color: #00e676;
        }

        .result-header .value.miss {
            color: #ff1744;
        }

        #breakdown {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.85rem;
            line-height: 1.7;
            color: #ccc;
            white-space: pre;
            text-align: left;
        }
    </style>
{% endblock %}

{% block content %}
    <div class="container">
        <h1>Chord Identification</h1>
        <h2>Play the requested chord type</h2>

        <input id="player-input" type="text" placeholder="Your name" maxlength="24"
            style="width:100%; padding: 0.55rem 0.75rem; border: 2px solid #333; border-radius: 8px; background: #0f1529; color: #eee; font-size: 1rem; margin-bottom: 1.25rem;" />

        <div class="card">
            <div id="prompt-area">Press Start to Begin</div>
        </div>

        <button id="start-btn" onclick="startChallenge()">START CHALLENGE</button>
        <div id="status-text"></div>

        <div class="card" id="result-card" style="display:none;">
            <div class="result-header">
                <span class="label" id="result-detected"></span>
                <span class="value" id="result-score"></span>
            </div>
            <div id="breakdown"></div>
        </div>
    </div>
{% endblock %}

{% block scripts %}
    <script>
        let currentChallenge = null;
        let busy = false;
        const CHORDS = ['Major', 'Minor', 'Diminished'];

        const $prompt = document.getElementById('prompt-area');
        const $btn = document.getElementById('start-btn');
        const $status = document.getElementById('status-text');
        const $resultCard = document.getElementById('result-card');
        const $detected = document.getElementById('result-detected');
        const $score = document.getElementById('result-score');
        const $breakdown = document.getElementById('breakdown');

        function pickChallenge() {
            const quality = CHORDS[Math.floor(Math.random() * CHORDS.length)];
            currentChallenge = { expected_quality: quality };
            $prompt.textContent = `Play any ${quality} chord`;
        }

        async function startChallenge() {
            if (busy || !currentChallenge) return;
            busy = true;
            $btn.disabled = true;
            $btn.textContent = 'RECORDING...';
            $status.textContent = 'Recording 3 seconds — play now!';
            $resultCard.style.display = 'none';

            const player = document.getElementById('player-input').value.trim() || 'Anonymous';

            try {
                const res = await fetch('/play', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mode: 'chords',
                        expected_quality: currentChallenge.expected_quality,
                        // Optional root could be handled later. We only check quality for now
                        player: player,
                    }),
                });

                const data = await res.json();
                if (data.error === 'no_sound') {
                    $status.textContent = 'No sound detected — check your mic!';
                } else {
                    showResult(data);
                    $status.textContent = '';
                }
            } catch (err) {
                $status.textContent = 'Server error — is app.py running?';
            }

            busy = false;
            $btn.disabled = false;
            $btn.textContent = 'NEXT CHALLENGE';
            pickChallenge();
        }

        function showResult(data) {
            const chordLabel = `${data.chord.root} ${data.chord.quality} (${Math.round(data.chord.confidence * 100)}%)`;
            $detected.textContent = `Detected: ${chordLabel}`;
            $score.textContent = `${data.score} pts`;
            $score.className = 'value ' + (data.hit ? 'hit' : 'miss');
            $breakdown.textContent = data.breakdown.join('\n');
            $resultCard.style.display = 'block';
        }

        pickChallenge();
    </script>
{% endblock %}
