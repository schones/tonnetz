<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skratch Studio — Music Theory Games</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='shared/styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='skratch-studio/studio.css') }}">
  <!-- Blockly -->
  <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
  <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
  <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
  <script src="https://unpkg.com/blockly/msg/en.js"></script>
  <!-- FieldColour was removed from Blockly core in v12; load as plugin -->
  <script src="https://unpkg.com/@blockly/field-colour"></script>
  <!-- Tone.js for audio synthesis -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>

<body style="background: #11111b; color: #cdd6f4; overflow: hidden;">
  <header class="mtt-header" style="background: #181825; border-bottom: 1px solid #3a3a50;">
    <a href="/" class="mtt-header__logo" style="text-decoration: none;">
      <span aria-hidden="true">&#9835;</span> Music Theory Games
    </a>
    <nav class="mtt-header__nav">
      <a href="/" class="mtt-header__link">Home</a>
      <a href="#" class="mtt-header__link mtt-header__link--active">Skratch Studio</a>
      <a href="/skratch/help" class="mtt-header__link" target="_blank" rel="noopener"
        title="Open help guide in a new tab">&#10067; Help</a>
    </nav>
  </header>

  <main class="studio-layout">
    <!-- Left: Blockly Workspace -->
    <div class="studio-left">
      <div class="blockly-container">
        <div id="blocklyDiv"></div>
      </div>
    </div>

    <!-- Right: Canvas + Controls + Code Preview -->
    <div class="studio-right">
      <div class="canvas-panel">
        <!-- Canvas moved to the bottom of this panel for better visibility of controls -->
        <div class="studio-controls">
          <button id="btnPlay" class="btn btn--play" aria-label="Play">&#9654; Play</button>
          <button id="btnStop" class="btn btn--stop" disabled aria-label="Stop">&#9632; Stop</button>
          <label class="loop-toggle" title="Loop playback">
            <input type="checkbox" id="chkLoop">
            <span class="loop-toggle__label">&#x1F501; Loop</span>
          </label>
          <div id="beatIndicator" class="beat-indicator" aria-label="Beat indicator"></div>
          <select id="canvasSizeSelect" class="starter-select" aria-label="Canvas Size"
            style="margin-left: auto; margin-right: 8px;">
            <option value="400">Size: Medium (400)</option>
            <option value="200">Size: Small (200)</option>
            <option value="600">Size: Large (600)</option>
          </select>
          <select id="starterSelect" class="starter-select" aria-label="Load a starter program" style="margin-left: 0;">
            <option value="">Load a starter...</option>
            <optgroup label="Visual">
              <option value="circles">Circles</option>
              <option value="rainbow">Rainbow Grid</option>
              <option value="spiral">Spiral</option>
              <option value="sound_circles">Sound Circles</option>
              <option value="note_garden">Note Garden</option>
              <option value="bounce">Bounce</option>
            </optgroup>
            <optgroup label="Music">
              <option value="first_beat">First Beat</option>
              <option value="bass_groove">Bass Groove</option>
              <option value="my_first_song">My First Song</option>
              <option value="beat_painter">Beat Painter</option>
            </optgroup>
            <option value="blank">Blank Canvas</option>
          </select>
          <button id="btnClearBlocks" class="btn btn--clear" aria-label="Clear all blocks">Clear Blocks</button>
          <button id="btnClearCanvas" class="btn btn--clear" aria-label="Clear canvas">Clear Canvas</button>
        </div>
        <!-- Audio controls: piano + mic + BPM -->
        <div class="audio-controls">
          <div class="audio-controls__row">
            <button id="btnMic" class="btn btn--mic" aria-label="Toggle microphone">&#127908; Mic Off</button>
            <div class="bpm-control">
              <label for="bpmSlider" class="bpm-control__label">BPM</label>
              <input id="bpmSlider" type="range" min="60" max="180" value="120" class="bpm-control__slider"
                aria-label="Beats per minute">
              <span id="bpmValue" class="bpm-control__value">120</span>
            </div>
            <div class="volume-control">
              <label for="volumeSlider" class="bpm-control__label">VOL</label>
              <input id="volumeSlider" type="range" min="0" max="100" value="75" class="bpm-control__slider"
                aria-label="Volume">
              <span id="volumeValue" class="bpm-control__value">75%</span>
            </div>
          </div>
          <div class="piano-row">
            <select id="soundSelect" class="sound-select" aria-label="Keyboard sound">
              <option value="piano">Piano</option>
              <option value="organ">Organ</option>
              <option value="synth">Synth</option>
              <option value="choir_aahs">Choir</option>
              <option value="voice_oohs">Oohs</option>
            </select>
            <span id="pianoLoadingIndicator" class="piano-loading">Loading piano…</span>
            <div id="pianoContainer" class="piano-container"></div>
            <span id="sustainIndicator" class="sustain-indicator">Sustain: OFF</span>
          </div>
          <div class="piano-meta-row">
            <select id="pianoLabelSelect" class="piano-meta-select" aria-label="Piano key labels"
              title="Show labels on piano keys">
              <option value="none">Labels: Off</option>
              <option value="note">Note Names</option>
              <option value="solfege">Solfège</option>
            </select>
            <button id="btnMarkMode" class="btn btn--mark" title="Click keys to place or remove red dot markers">✎
              Mark</button>
            <button id="btnClearMarks" class="btn btn--clear" title="Remove all markers">✕ Clear Marks</button>
            <button id="btnPopOut" class="btn btn--popout" title="Open keyboard in a separate window">⇱ Pop Out</button>
          </div>
        </div>

        <!-- ── Loop Pedal ── -->
        <div class="loop-pedal-panel">
          <div class="loop-pedal__header">
            <span class="loop-pedal__title">&#127927; Loop Pedal</span>
            <div class="loop-pedal__header-controls">
              <select id="loopInputSource" class="loop-input-select" title="Input source for recording">
                <option value="keyboard">&#9000;&#65039; Keyboard</option>
                <option value="microphone">&#127908; Microphone</option>
              </select>
              <label class="loop-toggle" title="Snap loop length to nearest bar">
                <input type="checkbox" id="chkQuantize">
                <span class="loop-toggle__label">Quantize to bar</span>
              </label>
            </div>
          </div>
          <div class="loop-pedal__controls">
            <button id="btnLoopRecord" class="btn btn--loop-record">&#9679; Rec [1]</button>
            <button id="btnLoopStopRec" class="btn btn--loop-stoprec" disabled>&#9632; Stop</button>
            <button id="btnLoopOverdub" class="btn btn--loop-overdub" disabled>&#8853; Overdub L2 [2]</button>
            <button id="btnLoopPlay" class="btn btn--loop-play" disabled>&#9654; Play [3]</button>
            <button id="btnClearL1" class="btn btn--clear" disabled>Clear L1</button>
            <button id="btnClearL2" class="btn btn--clear" disabled>Clear L2</button>
            <button id="btnClearL3" class="btn btn--clear" disabled>Clear L3</button>
            <button id="btnLoopClearAll" class="btn btn--clear" disabled>&#8856; Clear All Loops</button>
            <button id="btnSaveAsBlock" class="btn btn--save-block" disabled>&#128190; Save as Block</button>
          </div>
          <div class="loop-pedal__info">
            <span id="loopPedalStatus" class="loop-pedal__status">Ready &#8212; press Record [1] to start</span>
            <span id="loopLengthDisplay" class="loop-pedal__length"></span>
          </div>
          <div class="loop-pedal__viz">
            <canvas id="loopPianoRoll" class="loop-viz-canvas" width="800" height="80"
              title="Piano roll: time → pitch, colored by layer"></canvas>
            <canvas id="loopBarViz" class="loop-viz-canvas" width="800" height="72"
              title="Bar timeline: colored bars per layer (L1/L2/L3)"></canvas>
          </div>
        </div>

        <div class="canvas-wrapper canvas-grid-bg" style="margin-top: 16px;">
          <canvas id="skratchCanvas" width="400" height="400"></canvas>
        </div>
        <div id="errorBar" class="error-bar" hidden></div>
      </div>

      <div class="code-preview">
        <div class="code-preview__header" id="codePreviewHeader" role="button" tabindex="0" aria-expanded="true"
          aria-controls="codePreviewBody">
          <div>
            <span class="code-preview__title">See the Code</span>
            <span class="code-preview__subtitle">Real JavaScript — visuals use Canvas API, music uses Tone.js!</span>
          </div>
          <div class="code-preview__actions">
            <button id="btnCopy" class="btn--copy" aria-label="Copy code">Copy</button>
            <span id="codePreviewToggle" class="code-preview__toggle open" aria-hidden="true">&#9660;</span>
          </div>
        </div>
        <div class="code-preview__body" id="codePreviewBody">
          <pre class="code-preview__code" id="codePreviewContent">// Drag blocks to start coding!</pre>
        </div>
      </div>
    </div>
  </main>

  <!-- Loop name modal — replaces browser prompt() for "Save as Block" -->
  <dialog id="loopNameModal" class="loop-name-modal">
    <p class="loop-name-modal__title">&#128190; Name Your Loop</p>
    <input type="text" id="loopNameInput" class="loop-name-modal__input" maxlength="40" autocomplete="off"
      spellcheck="false" autofocus>
    <div class="loop-name-modal__buttons">
      <button id="loopNameOk" class="btn btn--save-block">Save</button>
      <button id="loopNameCancel" class="btn btn--loop-stoprec">Cancel</button>
    </div>
  </dialog>

  <script type="module">
    import { init } from '/static/skratch-studio/studio.js';
    init();
  </script>
</body>

</html>
