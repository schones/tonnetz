<!DOCTYPE html>
<html lang="en" data-theme="{% block theme %}light{% endblock %}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SongLab{% endblock %}</title>

  <!-- Google Fonts: Nunito -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;700;800&display=swap" rel="stylesheet">

  <!-- SongLab design tokens (must load before shared styles so vars are available) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/design-tokens.css') }}">

  <!-- Shared design system -->
  <link rel="stylesheet" href="{{ url_for('static', filename='shared/styles.css') }}">

  <style>
    :root {
      /* Map old variable names to SongLab warm palette */
      --bg-primary:       #F7F3E8;
      --bg-secondary:     #F1ECE0;
      --bg-card:          #FFFFFF;
      --bg-input:         #FFFFFF;
      --text-primary:     #1F1B16;
      --text-secondary:   #4A4339;
      --text-muted:       #6B6457;
      --text-highlight:   #2D5F8A;
      --text-success:     #4CAF50;
      --text-error:       #C62828;
      --text-warning:     #D4A03C;
      --text-info:        #2D5F8A;
      --text-accent-warm: #E87461;
      --accent:           #2D5F8A;
      --accent-soft:      rgba(45, 95, 138, 0.10);
      --border:           #D9D2C0;
      --border-input:     #BFB6A0;
      --btn-primary-bg:   #2D5F8A;
      --btn-primary-text: #FFFFFF;
      --table-row-alt:    rgba(0, 0, 0, 0.03);
      --font-main:        'Nunito', system-ui, -apple-system, sans-serif;
    }

    [data-theme="dark"] {
      --bg-primary:       #15151B;
      --bg-secondary:     #0E0E12;
      --bg-card:          #1C1C24;
      --bg-input:         #12121A;
      --text-primary:     #F2EFE6;
      --text-secondary:   #B5AE9F;
      --text-muted:       #8A8374;
      --text-highlight:   #3A8BC9;
      --accent:           #3A8BC9;
      --accent-soft:      rgba(58, 139, 201, 0.12);
      --border:           #2E2E3A;
      --border-input:     #43434F;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-main);
      transition: background 0.2s ease, color 0.2s ease;
    }
  </style>

  <style>
    /* ── SongLab nav ─────────────────────────────────────────── */
    .sl-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-lg);
      padding: var(--space-md) var(--space-2xl);
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-subtle);
    }

    .sl-brand {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      flex-shrink: 0;
      text-decoration: none;
    }

    .sl-logo {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-lg);
      background: var(--accent-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(45, 95, 138, 0.25);
    }

    .sl-logo svg { display: block; }

    .sl-brand__name {
      font-family: var(--font-family-display);
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-medium);
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .sl-nav__links {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      flex-wrap: wrap;
    }

    .sl-nav__link {
      padding: 6px 14px;
      border-radius: var(--radius-md);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--text-secondary);
      text-decoration: none;
      transition: var(--transition-color);
    }

    .sl-nav__link:hover {
      color: var(--accent-blue);
      background: var(--bg-raised);
    }

    .sl-nav__link--active {
      color: var(--accent-blue);
      background: var(--bg-raised);
    }

    .sl-nav__sound {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      background: var(--bg-surface);
      color: var(--text-secondary);
      cursor: pointer;
      flex-shrink: 0;
      transition: var(--transition-color);
    }

    .sl-nav__sound:hover {
      color: var(--accent-blue);
      border-color: var(--border-color);
    }

    @media (max-width: 900px) {
      .sl-nav { padding: var(--space-sm) var(--space-lg); }
    }

    @media (max-width: 540px) {
      .sl-nav__links { gap: 0; }
      .sl-nav__link {
        padding: 4px 8px;
        font-size: var(--font-size-xs);
      }
    }
  </style>

  {% block head %}{% endblock %}
</head>

<body>
  <nav class="sl-nav">
    <a href="/" class="sl-brand">
      <span class="sl-logo" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 17.5V6.2L19 4v11.3" stroke="#D4A03C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <ellipse cx="7" cy="17.5" rx="2.5" ry="2" fill="#D4A03C"/>
          <ellipse cx="17" cy="15.3" rx="2.5" ry="2" fill="#D4A03C"/>
        </svg>
      </span>
      <span class="sl-brand__name">SongLab</span>
    </a>
    <div class="sl-nav__links">
      <a href="/explorer" class="sl-nav__link">Explorer</a>
      <a href="/harmony" class="sl-nav__link">Ear training</a>
      <a href="/rhythm" class="sl-nav__link">Rhythm &amp; play</a>
      <a href="/skratchlab" class="sl-nav__link">SkratchLab</a>
      <a href="/games/chord-walks" class="sl-nav__link">Games</a>
    </div>
    <button id="sl-sound-toggle" class="sl-nav__sound" aria-label="Toggle sound" title="Toggle sound">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
    </button>
  </nav>

  {% block content %}{% endblock %}

  {% block scripts %}{% endblock %}

  <!-- Hide the global floating audio toggle — surfaced inside the nav instead. -->
  <style>.audio-toggle-btn { display: none !important; }</style>

  <!-- Global audio mute/unmute toggle (loads on every page) -->
  <script src="{{ url_for('static', filename='shared/audio-toggle.js') }}"></script>

  <script>
    // Highlight the current nav link based on window.location.pathname.
    (function () {
      var path = window.location.pathname;
      document.querySelectorAll('.sl-nav__link').forEach(function (el) {
        var href = el.getAttribute('href');
        if (!href) return;
        // Games tab spans every /games/* route, not just its own href.
        var prefix = href.indexOf('/games/') === 0 ? '/games' : href;
        if (path === prefix || path.startsWith(prefix + '/')) {
          el.classList.add('sl-nav__link--active');
        }
      });
    })();
  </script>

  <script>
    // Wire the in-nav sound button to the global AudioToggle.
    (function () {
      const ICON_ON = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';
      const ICON_OFF = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';
      const btn = document.getElementById('sl-sound-toggle');
      if (!btn) return;
      const floating = () => document.querySelector('.audio-toggle-btn');

      function refresh() {
        const muted = window.AudioToggle ? window.AudioToggle.isMuted() : false;
        btn.innerHTML = muted ? ICON_OFF : ICON_ON;
        btn.setAttribute('aria-label', muted ? 'Unmute sound' : 'Mute sound');
        btn.title = muted ? 'Sound off — click to unmute' : 'Sound on — click to mute';
        btn.style.opacity = muted ? '0.55' : '1';
      }

      btn.addEventListener('click', () => {
        const f = floating();
        if (f) f.click();
        else refresh();
      });

      window.addEventListener('tonnetz:mute-changed', refresh);
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', refresh);
      } else {
        refresh();
      }
    })();
  </script>
</body>

</html>
